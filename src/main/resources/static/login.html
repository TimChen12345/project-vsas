<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — VSAS</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #f87171;
      --ok: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 20, 25, 0.85);
      backdrop-filter: blur(8px);
    }
    header a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    header a:hover { color: var(--text); }
    .brand { font-weight: 600; }
    main { max-width: 420px; margin: 2.5rem auto; padding: 0 1rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem 1.5rem 2rem;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.35rem; font-weight: 600; }
    .subtitle { margin: 0 0 1.5rem; color: var(--muted); font-size: 0.9rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f1419;
      color: var(--text);
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    button[type="submit"] {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }
    .msg {
      margin-top: 1rem;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .msg.show { display: block; }
    .msg.err { background: rgba(248, 113, 113, 0.12); color: var(--danger); border: 1px solid rgba(248, 113, 113, 0.25); }
    .msg.ok { background: rgba(52, 211, 153, 0.12); color: var(--ok); border: 1px solid rgba(52, 211, 153, 0.25); }
  </style>
</head>
<body>
  <header>
    <span class="brand">VSAS</span>
    <nav>
      <a href="/">Home</a>
      &nbsp;·&nbsp;
      <a href="/library.html">Library</a>
      &nbsp;·&nbsp;
      <a href="/register.html">No account? Sign up</a>
    </nav>
  </header>
  <main>
    <div class="card">
      <h1>Sign in</h1>
      <p class="subtitle">After signing in you will be taken to your dashboard.</p>
      <form id="form" novalidate>
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required />
        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required />
        <button type="submit" id="btn">Sign in</button>
      </form>
      <div id="msg" class="msg" role="alert"></div>
    </div>
  </main>
  <script>
    const TOKEN_KEY = "vsas_token";
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    function show(text, ok) {
      msg.textContent = text;
      msg.className = "msg show " + (ok ? "ok" : "err");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.className = "msg";
      msg.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      btn.disabled = true;
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.token) {
          localStorage.setItem(TOKEN_KEY, data.token);
          show("Signed in. Opening your dashboard…", true);
          setTimeout(() => (location.href = "/library.html"), 800);
        } else {
          show(data.error || "Invalid username or password.", false);
        }
      } catch {
        show("Network error. Make sure the server is running.", false);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
